apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: np-allow-gateway-access
  namespace: observability
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tailscale
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
        - podSelector: {}    # ← allows all pods within observability to talk to each other