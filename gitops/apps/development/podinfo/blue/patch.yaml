apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  template:
    spec:
      containers:
        - name: frontend
          image: ghcr.io/stefanprodan/podinfo:6.11.1
          env:
            - name: PODINFO_UI_COLOR
              value: "#1a56db"
            - name: PODINFO_UI_MESSAGE
              value: "blue"
          command:
            - ./podinfo
            - --port=9898
            - --port-metrics=9797
            - --level=info
            - --backend-url=http://blue-backend:9898/echo
            - --cache-server=tcp://blue-cache:6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  template:
    spec:
      containers:
        - name: backend
          image: ghcr.io/stefanprodan/podinfo:6.11.1
          command:
            - ./podinfo
            - --port=9898
            - --port-metrics=9797
            - --level=info
            - --cache-server=tcp://blue-cache:6379