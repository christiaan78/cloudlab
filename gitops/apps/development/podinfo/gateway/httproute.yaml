apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend
  namespace: apps
spec:
  parentRefs:
    - name: cloudlab
      namespace: envoy-gateway-system
  hostnames:
    - "frontend.lab.christiaan.cloud"
  rules:
  - matches:
      - path:
          type: PathPrefix
          value: /
    backendRefs:
      - name: frontend-blue
        port: 80
        weight: 100
      - name: frontend-green
        port: 80
        weight: 0